<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLOW · Itinerario Condiviso</title>
    <style>
        :root {
            --color-primary: rgb(83, 96, 254);
            --color-secondary: rgb(198, 255, 141);
            --color-bg: #0B0B0F;
            --color-surface: #16161F;
            --color-surface-card: #21212E;
            --color-text-main: #FFFFFF;
            --color-text-muted: #8E8E9F;
        }

        * { box-sizing: border-box; margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

        body {
            background-color: var(--color-bg);
            color: var(--color-text-main);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background-color: var(--color-surface);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        .app-header {
            background-color: var(--color-primary);
            padding: 30px 20px;
            text-align: center;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }

        .app-header h1 {
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 8px;
        }

        .app-header .user-badge {
            font-size: 26px;
            font-weight: 900;
            color: var(--color-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .app-header .date-sub {
            font-size: 12px;
            color: #FFFFFF;
            opacity: 0.7;
            margin-top: 5px;
            font-weight: 600;
        }

        .itinerary-content { padding: 25px 20px; flex: 1; }

        .section-title {
            font-size: 11px;
            font-weight: 900;
            color: var(--color-text-muted);
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .timeline { position: relative; padding-left: 20px; }

        .timeline::before {
            content: '';
            position: absolute;
            left: 4px; top: 10px; bottom: 10px;
            width: 2px;
            border-left: 2px dashed rgba(83, 96, 254, 0.4);
        }

        .timeline-item { position: relative; margin-bottom: 25px; }
        .timeline-item:last-child { margin-bottom: 0; }

        .timeline-badge {
            position: absolute;
            left: -22px; top: 4px;
            width: 12px; height: 12px;
            border-radius: 50%;
            background-color: var(--color-secondary);
            border: 3px solid var(--color-primary);
            box-shadow: 0 0 8px var(--color-secondary);
        }

        .event-card {
            background-color: var(--color-surface-card);
            border-radius: 20px;
            padding: 18px;
        }

        .event-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .event-tag {
            background-color: rgba(198, 255, 141, 0.15);
            color: var(--color-secondary);
            font-size: 10px;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .event-time { font-size: 11px; color: var(--color-text-muted); font-weight: bold; }

        .event-title {
            font-size: 16px;
            font-weight: 800;
            color: var(--color-text-main);
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .event-location {
            font-size: 12px;
            color: var(--color-text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 600;
        }

        .event-location strong { color: var(--color-primary); }

        .user-note {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 12px;
            color: var(--color-secondary);
            font-style: italic;
            display: flex;
            gap: 6px;
        }

        .user-note::before { content: '"'; font-size: 18px; line-height: 1; font-family: serif; }

        .walk-time {
            font-size: 11px;
            color: var(--color-text-muted);
            margin: 12px 0 12px 15px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
        }

        .app-footer {
            text-align: center;
            padding: 25px 20px;
            font-size: 10px;
            color: var(--color-text-muted);
            letter-spacing: 3px;
            font-weight: 700;
            border-top: 1px solid rgba(255,255,255,0.05);
            background-color: rgba(0,0,0,0.1);
        }

        .cta-btn {
            display: inline-block;
            margin-top: 15px;
            background-color: var(--color-primary);
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 15px;
            font-weight: 800;
            font-size: 13px;
            letter-spacing: 1px;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 15px rgba(83, 96, 254, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--color-text-muted);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>ITINERARIO OTTIMIZZATO</h1>
            <div class="user-badge" id="userName">FLOW PASSPORT</div>
            <div class="date-sub" id="dateSub">Design Week 2026</div>
        </header>

        <div class="itinerary-content">
            <h2 class="section-title">Le Tappe Condivise</h2>
            <div class="timeline" id="timeline">
                <div class="empty-state">Caricamento itinerario...</div>
            </div>
        </div>

        <footer class="app-footer">
            <div>FLOW · DESIGN WEEK PASSPORT</div>
            <button class="cta-btn" id="openAppBtn">⬇︎ Scarica FLOW App</button>
        </footer>
    </div>

<script>
    // ── 1. Legge e mostra i dati dall'URL ──────────────────────────
    const hashData = window.location.hash.substring(1);
    const parti = hashData ? hashData.split('/') : [];
    const user = parti[0] ? decodeURIComponent(parti[0]) : null;
    const dateStr = parti[1] || null;
    const eventiRaw = parti[2] ? decodeURIComponent(parti[2]) : null;

    if (user) {
        const nomePulito = user.replace(/-/g, ' ').toUpperCase();
        document.getElementById('userName').innerText = 'ITINERARIO DI ' + nomePulito;
    }

    if (dateStr) {
        const opzioni = { day: 'numeric', month: 'long', year: 'numeric' };
        const dataFormattata = new Date(dateStr).toLocaleDateString('it-IT', opzioni);
        document.getElementById('dateSub').innerText = 'Fuorisalone · ' + dataFormattata;
    }

    // ── 2. Costruisce la timeline con gli eventi reali ─────────────
    const timeline = document.getElementById('timeline');

    if (eventiRaw) {
        try {
            const eventi = JSON.parse(eventiRaw);

            if (eventi.length === 0) {
                timeline.innerHTML = '<div class="empty-state">Nessuna tappa in questo itinerario.</div>';
            } else {
                timeline.innerHTML = '';

                eventi.forEach(function(ev, index) {
                    if (index > 0 && ev.w > 0) {
                        const walk = document.createElement('div');
                        walk.className = 'walk-time';
                        walk.innerHTML = `
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M13.5 5.5c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z
                                         M9.8 8.9L7 23h2.1l1.8-8 2.1 2v6h2v-7.5l-2.1-2 
                                         .6-3c1 1.15 2.41 2 4 2V10.5c-1.19 0-2.42-.6-3.17-1.58
                                         l-1-1.6c-.4-.64-1.11-1.02-1.88-1.02-.28 0-.57.04-.85.13
                                         L4.2 7.9V13h2V9.3l1.8-.7"/>
                            </svg>
                            <span>~ ${ev.w} min a piedi</span>`;
                        timeline.appendChild(walk);
                    }

                    const item = document.createElement('div');
                    item.className = 'timeline-item';
                    const noteHtml = ev.n ? `<div class="user-note">${ev.n}</div>` : '';

                    item.innerHTML = `
                        <div class="timeline-badge"></div>
                        <div class="event-card">
                            <div class="event-header">
                                <span class="event-tag">Tappa ${index + 1}</span>
                                <span class="event-time">${ev.h}</span>
                            </div>
                            <h3 class="event-title">${ev.t}</h3>
                            <div class="event-location">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" 
                                     stroke="currentColor" stroke-width="2.5">
                                    <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/>
                                    <circle cx="12" cy="10" r="3"/>
                                </svg>
                                <strong>${ev.l}</strong>
                            </div>
                            ${noteHtml}
                        </div>`;
                    timeline.appendChild(item);
                });
            }
        } catch(e) {
            timeline.innerHTML = '<div class="empty-state">Errore nel caricamento delle tappe.</div>';
        }
    } else {
        timeline.innerHTML = '<div class="empty-state">Nessuna tappa trovata.</div>';
    }

    // ── 3. Logica pulsante Scarica ─────────────────────────────────
    const btn = document.getElementById('openAppBtn');

    // Pulsante nascosto di default
    btn.style.display = 'none';

    // Prova ad aprire il deep link silenziosamente
    // Se la pagina NON va in background entro 2s
    // significa che l'app non è installata → mostra il pulsante
    const hash = window.location.hash;
    const deepLink = 'flowapp://itinerary' + hash;

    let appOpened = false;

    document.addEventListener('visibilitychange', function onVis() {
        if (document.hidden) {
            // La pagina è andata in background = app si è aperta
            appOpened = true;
            document.removeEventListener('visibilitychange', onVis);
        }
    });

    // Tenta apertura silenziosa
    const iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    document.body.appendChild(iframe);
    iframe.src = deepLink;

    setTimeout(function() {
        document.body.removeChild(iframe);
        if (!appOpened) {
            // App non trovata: mostra il pulsante di download
            btn.style.display = 'inline-block';
            btn.textContent = '⬇︎ Scarica FLOW App';
        }
        // Se appOpened è true: pulsante rimane nascosto
    }, 2000);

    // Click sul pulsante
    btn.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();

        const isAndroid = /android/i.test(navigator.userAgent);
        if (isAndroid) {
            window.location.href = 'https://play.google.com/store/apps';
        } else {
            window.location.href = 'https://apps.apple.com';
        }
    });
</script>
</body>
</html>
